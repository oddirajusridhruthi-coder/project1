<!DOCTYPE html>
<html>
<head>
<title>About - Fries Paradise 🍟</title>

<style>
:root{
    --primary:#ff6600;
    --bg:#fff5e6;
    --text:#222;
}

body{
margin:0;
font-family:Segoe UI;
background:var(--bg);
color:var(--text);

display:flex;
flex-direction:column;
min-height:100vh;
}

/* NAV */
nav{
    display:flex;
    justify-content:space-between;
    padding:20px;
    background:var(--primary);
    color:white;
}

nav a{
    color:white;
    margin-left:20px;
    text-decoration:none;
}
nav a:hover{
    color:yellow;
}

/* CONTENT */
.about{
text-align:center;
padding:40px;
flex:1;
}

nav{
    display:flex;
    justify-content:space-between;
    padding:20px;
    background:var(--primary);
    color:white;
}


/* RESPONSIVE */
@media(max-width:768px){
    iframe{
        width:250px;
        height:150px;
    }

    nav{
        flex-direction:column;
        text-align:center;
    }
}
.footer{
    text-align:center;
    margin-top:40px;
    padding:15px;
    background:#ff6600;
    color:white;
}
.about-img{
width:400px;
border-radius:15px;
box-shadow:0px 5px 15px rgba(0,0,0,0.3);
margin:20px;
}

.about-img:hover{
transform:scale(1.05);
transition:.3s;
}

</style>
</head>




<body>

<nav>
<h2>Fries Paradise 🍟</h2>

</nav>

<section class="about">

<h1>About Us 🍟</h1>

<p>
Welcome to Fries Paradise! We serve crispy, golden French fries in every style —
salted, peri-peri, cheese, garlic, chili and more.
Fresh, hot, and full of crunch in every bite!
</p>
<img src="https://images.unsplash.com/photo-1541592106381-b31e9677c0e5" class="about-img">
</section>
<section class="about">

</section>

<div class="footer">
© 2026 Fries Paradise | Made with ❤ for fries lovers
</div>
</body>
</html>

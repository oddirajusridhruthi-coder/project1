<!DOCTYPE html>
<html>
<head>
<title>Fries Paradise 🍟</title>
<style>

:root{
    --primary:#ff6600;
    --bg:#fff5e6;
    --text:#222;
}

body{
    margin:0;
    font-family:Segoe UI;
    background:var(--bg);
    color:var(--text);
}

/* NAV */
nav{
    display:flex;
    justify-content:space-between;
    padding:20px;
    background:var(--primary);
    color:white;
   
}

nav a{
    color:white;
    margin-left:20px;
    text-decoration:none;
}
nav a:hover{
    color:yellow;
}

/* HERO */
.hero{
   background-image: url("friesheads.webp");
            background-size: cover;
            background-position: center;
    height:calc(100vh - 80px);
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    animation:fade 2s;
}

.hero h1::after{
    content:" 🍟";
}

/* ANIMATION */
@keyframes fade{
    from{opacity:0;}
    to{opacity:1;}
}

</style>
</head>
